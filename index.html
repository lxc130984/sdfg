<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Rust WASM Hello</title>
</head>
<body>
    <h1>Rust WASM Hello World</h1>
    <p>打开控制台看 Rust 的输出</p>
    <button onclick="runAdd()">点我调用 Rust 加法</button>

    <script type="module">
        import init, { add } from './pkg/myweb.js';

        async function run() {
            await init();
            console.log("WASM 已加载");
        }
        
        window.runAdd = function() {
            const result = add(3, 5);
            alert(`3 + 5 = ${result}`);
        };

        run();
    </script>
</body>
</html>
